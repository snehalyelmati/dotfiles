# set prefix key as Alt+b
set-option -g prefix C-b

# Create tmux window from the current path
bind c new-window -c "#{pane_current_path}"

# 0 is too far from ` ;)
set -g base-index 1

# Automatically set window title
set-option -g allow-rename off

# renumber tmux windows
set-option -g renumber-windows on

# disable alternate tmux buffer
set-option -ga terminal-overrides ',xterm*:smcup@:rmcup@:indn@'

set -g default-terminal xterm-256color
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -sa terminal-features ',*:RGB'
set -g mouse on
set -g status-keys vi
set -g history-limit 10000

setw -g mode-keys vi
setw -g monitor-activity on

bind-key | split-window -h
bind-key _ split-window -v

bind-key J resize-pane -D 10
bind-key K resize-pane -U 10
bind-key H resize-pane -L 10
bind-key L resize-pane -R 10

bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Use Alt-vim keys without prefix key to switch panes
# bind -n M-h select-pane -L
# bind -n M-j select-pane -D 
# bind -n M-k select-pane -U
# bind -n M-l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
# bind -n M-Left select-pane -L
# bind -n M-Right select-pane -R
# bind -n M-Up select-pane -U
# bind -n M-Down select-pane -D

# Switch windows
bind-key -n M-h previous-window
bind-key -n M-l next-window

# Swap adjacent windows
bind-key -n C-S-M-h swap-window -t -1\; select-window -t -1
bind-key -n C-S-M-l swap-window -t +1\; select-window -t +1

# No delay for escape key press
set -sg escape-time 0

# Reload tmux config
bind r source-file ~/.tmux.conf

# Theme: match the terminal background so tmux's required status cells disappear.
set -g status-bg terminal
set -g status-fg '#C5C9C7'
set-option -g status-style bg=terminal,fg=#C5C9C7
set-window-option -g window-status-style bg=terminal,fg=#909398
set-window-option -g window-status-current-style bg=terminal,fg=#E6C384,bold
set-window-option -g window-status-format '#I:#W '
set-window-option -g window-status-current-format '#I:#W '

set -g status-interval 1
set -g status-left-length 30
set -g status-left '#[fg=#7FB4CA] (#S) #[fg=#C5C9C7]#(whoami) '
set -g status-right '#[fg=#C5C9C7]%H:%M:%S '

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm\*:extkeys'
